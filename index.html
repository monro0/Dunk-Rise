<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dunk Shot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    
    <div id="game-container">
        
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="main-menu">
            <button id="settingsButton" class="menu-icon-btn" aria-label="Настройки">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            
            <div class="menu-content">
                <h1 class="game-title">DUNK RISE</h1>

                <div class="menu-record">
                    <svg class="trophy-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                        <path d="M4 22h16"/>
                        <path d="M10 14.66V22"/>
                        <path d="M14 14.66V22"/>
                        <path d="M17.73 4H6.27a2 2 0 0 0-2 2.54v3.31a2 2 0 0 0 2 2.54h11.46a2 2 0 0 0 2-2.54V6.54a2 2 0 0 0-2-2.54z"/>
                    </svg>
                    <span>BEST: <span id="menu-high-score">0</span></span>
                </div>

                <button id="playButton" class="btn-neon-primary">ИГРАТЬ</button>

                <div class="menu-secondary">
                    <button id="shopButton" class="menu-secondary-btn" aria-label="Магазин">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </button>
                    <button id="leaderboardButton" class="menu-secondary-btn" aria-label="Таблица лидеров">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 20V10"></path>
                            <path d="M12 20V4"></path>
                            <path d="M6 20v-6"></path>
                        </svg>
                    </button>
                </div>

                <div class="menu-stars">
                    <span aria-hidden="true">⭐</span> <span id="menu-stars">0</span>
                </div>
            </div>
        </div>

        <!-- ЭКРАН МАГАЗИНА -->
        <div id="shop-screen" class="hidden">
            <div class="screen-panel">
                <h2>МАГАЗИН</h2>
                <div class="shop-stars">
                    <span aria-hidden="true">⭐</span> <span id="shop-stars">0</span>
                </div>

                <!-- Табы -->
                <div class="shop-tabs">
                    <button class="shop-tab shop-tab--active" id="tabSkins">Скины</button>
                    <button class="shop-tab" id="tabCase">Кейс</button>
                </div>

                <!-- Контент: Скины -->
                <div id="shopSkinsContent">
                    <div class="shop-grid">
                        <!-- Карточки генерируются в UI.js -->
                    </div>
                </div>

                <!-- Контент: Кейс -->
                <div id="shopCaseContent" class="hidden">
                    <div class="case-reel-wrapper">
                        <div class="case-reel-viewport">
                            <div class="case-reel-strip" id="caseReelStrip"></div>
                        </div>
                        <div class="case-reel-marker"></div>
                    </div>
                    <button id="caseOpenBtn" class="btn-case-open">КРУТИТЬ ЗА 20 ⭐</button>
                    <div class="case-owned-section">
                        <div class="case-owned-label">Выбито из кейса:</div>
                        <div class="case-owned-grid" id="caseOwnedGrid"></div>
                    </div>
                </div>

                <button id="shopBackBtn" class="btn-neon-secondary" style="margin-top: 16px;">Назад</button>
            </div>
        </div>

        <!-- ПОПАП РЕЗУЛЬТАТА КЕЙСА -->
        <div id="caseResultPopup" class="hidden">
            <div class="case-result-overlay">
                <div class="case-result-card">
                    <div class="case-result-rarity" id="caseResultRarity">Редкий</div>
                    <canvas class="case-result-canvas" id="caseResultCanvas" width="120" height="120"></canvas>
                    <div class="case-result-name" id="caseResultName">Название</div>
                    <div class="case-result-bonus" id="caseResultBonus"></div>
                    <button class="btn-neon-primary" id="caseResultCloseBtn">Продолжить</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН НАСТРОЕК -->
        <div id="settings-screen" class="hidden">
            <div class="screen-panel">
                <h2>НАСТРОЙКИ</h2>

                <div class="setting-row">
                    <span>Вибрация</span>
                    <label class="switch">
                        <input type="checkbox" id="vibrationToggle">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <span>Звук</span>
                    <label class="switch">
                        <input type="checkbox" id="soundToggle">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="stats-section">
                    <div class="stat-row">
                        <span class="stat-icon">🌍</span>
                        <span class="stat-label">Игроков:</span>
                        <span class="stat-value" id="totalPlayers">Загрузка...</span>
                    </div>
                </div>

                <button id="settingsBackBtn" class="btn-neon-secondary">Назад</button>
            </div>
        </div>

        <!-- ТАБЛИЦА ЛИДЕРОВ -->
        <div id="leaderboard-screen" class="hidden">
            <div class="screen-panel leaderboard-panel">
                <h2>ТОП ИГРОКОВ</h2>
                
                <div id="leaderboard-list" class="leaderboard-list">
                    <div class="leaderboard-loading">Загрузка...</div>
                </div>
                
                <button id="leaderboardBackBtn" class="btn-neon-secondary" style="margin-top: 20px;">Назад</button>
            </div>
        </div>

        <!-- HUD ИГРЫ -->
        <div id="game-hud" class="hidden">
            <button id="homeBtn" aria-label="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>

            <div id="stars-container">
                <span aria-hidden="true">⭐</span> <span id="stars-value">0</span>
            </div>

            <div id="high-score-container">
                <svg class="trophy-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                    <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                    <path d="M4 22h16"/>
                    <path d="M10 14.66V22"/>
                    <path d="M14 14.66V22"/>
                    <path d="M17.73 4H6.27a2 2 0 0 0-2 2.54v3.31a2 2 0 0 0 2 2.54h11.46a2 2 0 0 0 2-2.54V6.54a2 2 0 0 0-2-2.54z"/>
                </svg>
                <span id="high-score-value">0</span>
            </div>

            <button id="topRestartBtn" aria-label="Restart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>

            <div id="ui-container">
                <div id="score">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="secondChanceScreen" class="hidden">
            <div class="modal">
                <button id="closeSecondChance">&times;</button>
                <h2>Продолжить?</h2>
                <div id="secondChanceTimer">5</div>
                <button id="adButton" class="ad-button">
                    <span>📺</span> Подпишись и получи шанс
                </button>
                <p class="subtext ad-subtext">Подпишись на канал и получи второй шанс</p>
            </div>
        </div>

        <!-- ЭКРАН ПРОИГРЫША -->
        <div id="gameOverScreen" class="hidden">
            <div class="modal">
                <h1>ПРОИГРЫШ</h1>
                <div id="finalScore"></div>
                <button id="restartButton" class="btn-neon-primary">Играть снова</button>
                <button id="goHomeButton" class="btn-neon-secondary">В Меню</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
